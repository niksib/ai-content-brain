name: Deploy to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_API_JSON }}'

      - name: Deploy via IAP SSH
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: 'instance-20251230-192400'
          zone: 'us-central1-c'
          ssh_private_key: '${{ secrets.SSH_PRIVATE_KEY }}'
          command: |
            set -e

            cd /var/www/ai-content-brain

            # 1. Обновить конфиги (nginx, docker-compose) из репо
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # 2. Обновить .env файл
            echo "${{ secrets.PROD_ENV }}" | sudo tee docker/prod/.env > /dev/null

            # 3. Авторизация в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 4. Pull образов с точным SHA
            sudo docker pull ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            sudo docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

            # 5. Тегировать как latest
            sudo docker tag ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:latest
            sudo docker tag ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/frontend:latest

            # 6. Миграции до перезапуска
            sudo docker compose -f docker/prod/docker-compose.yml \
              run --rm --no-deps backend npx prisma migrate deploy

            # 7. Перезапуск контейнеров
            sudo docker compose -f docker/prod/docker-compose.yml \
              up -d --remove-orphans --force-recreate backend frontend

            # 8. Чистим старые образы
            sudo docker system prune -a -f
